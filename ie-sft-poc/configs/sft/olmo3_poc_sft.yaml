### OLMo3 POC LoRA SFT Training Configuration
### LLaMA-Factory compatible SFT config for IE task instruction tuning
### WARNING: This is a POC configuration using placeholder model

# Model Configuration
### TODO: Update model_name_or_path when actual OLMo3 1B model is available
model_name_or_path: allenai/OLMo-2-0325-32B-Instruct
template: default

# Training Method
stage: sft
do_train: true
finetuning_type: lora
lora_target: all
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05

# Dataset Configuration
dataset: ie_sft_unified
dataset_dir: data/processed/llamafactory
cutoff_len: 2048
preprocessing_num_workers: 4

# Output Configuration
output_dir: outputs/olmo3-poc-ie-lora
logging_steps: 10
save_steps: 500
save_total_limit: 3

# Training Hyperparameters
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.1
max_grad_norm: 1.0

# Precision
bf16: true
fp16: false

# Evaluation
eval_strategy: steps
eval_steps: 500

# Other
ddp_timeout: 180000000
seed: 42
report_to:
  - tensorboard

