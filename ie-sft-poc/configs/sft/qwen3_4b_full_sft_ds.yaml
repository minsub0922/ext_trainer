### Qwen3-4B Full SFT + DeepSpeed ZeRO-3 Training Configuration
### LLaMA-Factory compatible config for multi-GPU full fine-tuning.
###
### Launch:
###   NPROC=4 bash scripts/train/run_sft.sh --model qwen3-4b --variant full
###   # or directly:
###   FORCE_TORCHRUN=1 NPROC_PER_NODE=4 llamafactory-cli train configs/sft/qwen3_4b_full_sft_ds.yaml

# Model Configuration
model_name_or_path: Qwen/Qwen3-4B
template: qwen

# Training Method — FULL fine-tune (not LoRA)
stage: sft
do_train: true
finetuning_type: full

# DeepSpeed — ZeRO-3 for 4B model to fit in multi-GPU memory.
deepspeed: configs/sft/deepspeed_z3.json

# Dataset Configuration
dataset: ie_sft_unified
dataset_dir: data/processed/llamafactory
cutoff_len: 2048
preprocessing_num_workers: 4

# Output Configuration
output_dir: outputs/qwen3-4b-ie-full-ds
overwrite_output_dir: true
logging_steps: 10
save_steps: 500
save_total_limit: 3

# Training Hyperparameters
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 2.0e-5
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.03
max_grad_norm: 1.0
weight_decay: 0.0

# Precision
bf16: true
fp16: false
flash_attn: auto

# Evaluation
val_size: 0.05
eval_strategy: steps
eval_steps: 500

# Other
ddp_timeout: 180000000
seed: 42
report_to:
  - tensorboard

# Notes
# - Uses ZeRO-3 (not ZeRO-2) to fit 4B params across GPUs
# - Micro batch 1 with grad_accum 16 for memory efficiency
# - Effective batch = 1 * 16 * N_GPUS
