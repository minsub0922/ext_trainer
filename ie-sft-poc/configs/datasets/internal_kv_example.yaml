### Internal K/V Extraction Dataset Template
### This is a template for internal key-value extraction datasets
name: internal_kv
source: internal
task_types:
  - kv
license: internal
default_enabled: false
description: "Template for internal K/V extraction datasets with domain-specific fields"
kv_fields:
  - company_name
  - date
  - amount
  - category
