### OLMo3-style stage 3 DPO for Qwen3-0.6B.
###
### Takes stage-2 SFT checkpoint and aligns it with preference pairs
### derived from the SFT model's own samples scored by ie_metrics.
### "chosen" = sample with higher IE-F1; "rejected" = lower.
###
### Preference dataset is built by:
###   scripts/preprocess/olmo3_style/build_preference_pairs.py
### which writes data/processed/olmo3_style/preference_pairs.jsonl and
### updates dataset_info.json with entry `ie_pref_pairs`.

model_name_or_path: outputs/olmo3_style/qwen3-0.6b/stage2_sft
template: qwen
ref_model: outputs/olmo3_style/qwen3-0.6b/stage2_sft

stage: dpo
do_train: true
finetuning_type: full

# DPO-specific
pref_beta: 0.1
pref_loss: sigmoid     # alt: ipo, kto_pair, orpo
pref_ftx: 0.0

deepspeed: configs/sft/deepspeed_z3.json

dataset: ie_pref_pairs
dataset_dir: data/processed/olmo3_style
cutoff_len: 2048
preprocessing_num_workers: 4

output_dir: outputs/olmo3_style/qwen3-0.6b/stage3_dpo
logging_steps: 10
save_steps: 200
save_total_limit: 2

per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 5.0e-7      # DPO typical: 3e-7 ~ 1e-6
num_train_epochs: 1
lr_scheduler_type: cosine
warmup_ratio: 0.05
max_grad_norm: 1.0
weight_decay: 0.0

bf16: true
fp16: false
flash_attn: fa2

val_size: 0.05
eval_strategy: steps
eval_steps: 200

ddp_timeout: 180000000
seed: 42
report_to:
  - tensorboard
